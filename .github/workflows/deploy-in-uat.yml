name: Deploy in UAT

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.generate-release.outputs.new-release-published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn add --dev --exact \
            semantic-release@25.0.3 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/commit-analyzer@13.0.1 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@12.0.6 \
            @semantic-release/exec@7.1.0 \
            @semantic-release/npm@13.1.5 \
            @semantic-release/release-notes-generator@14.1.0 \
            conventional-changelog-conventionalcommits@9.3.0

      - name: Generate release
        id: generate-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          echo "new-release-published=true" >> $GITHUB_OUTPUT

  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.new-release-published == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Release Branch
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"
          
          # Extract only major.minor (X.Y) from version (X.Y.Z)
          MAJOR_MINOR=$(echo "${VERSION}" | cut -d. -f1,2)
          BRANCH_NAME="release/v${MAJOR_MINOR}"
          echo "Creating branch: $BRANCH_NAME (from version ${VERSION})"
          
          # Check if branch already exists on remote
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "⚠️  Branch $BRANCH_NAME already exists on remote, skipping creation"
            echo "This is normal for patch releases (e.g., 1.0.1, 1.0.2, etc.)"
          else
            git checkout -b "$BRANCH_NAME"
            git push origin "$BRANCH_NAME"
            echo "✅ Release branch $BRANCH_NAME created successfully"
          fi

